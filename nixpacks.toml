[phases.setup]
nixPkgs = ["...", "php83", "php83Packages.composer", "nodejs"]

[phases.install]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "vendor/bin/heroku-php-apache2 public/"
