<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Supplier Sayur</title>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0fdf4;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px; text-align: center;
        }
        .box { max-width: 360px; }
        .icon { font-size: 72px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 8px; }
        p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
        button {
            padding: 11px 28px; background: #16a34a; color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }
        button:hover { background: #15803d; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🥬</div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Sepertinya Anda sedang offline. Periksa koneksi internet Anda dan coba lagi.</p>
        <button onclick="location.reload()">🔄 Coba Lagi</button>
    </div>
</body>
</html>
